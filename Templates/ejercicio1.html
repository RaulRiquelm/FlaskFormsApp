{% extends "base.html" %}
{% block content %}

  <div class="section">
    <h2>Calculo de compras</h2>
    <form action="/ejercicio1" method="post" class="formulario">

      <label for="nombre">Ingresa tu nombre</label>
      <input type="text" id="nombre" name="nombre" required>
      
      <label for="edad">Ingresa tu edad</label>
      <input type="text" id="edad" name="edad" required>
      
      <label for="cantidad">Ingresa la cantidad de tarros de pintura a comprar</label>
      <input type="number" id="cantidad" name="cantidad" required>
      
      <button type="submit">Calcular</button>
    </form>
    <div class="resultado">
    {% if resultado%}
      
        <p><strong>Nombre:</strong> {{ resultado.nombre }}</p>
        <p><strong>Total sin descuento:</strong> {{ resultado.total }}</p>
        <p><strong>Descuento:</strong> {{ resultado.descuento }}</p>
        <p><strong>Total a pagar:</strong> {{ resultado.total_pagar }}</p>
        
    {% endif %}
    </div>
  </div>
{% endblock %}
